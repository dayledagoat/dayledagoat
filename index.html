<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubbly Modern Landing Page</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Nunito',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(135deg,#fff8ff,#f5f8ff,#fff7f9);
    padding:30px;
}

.container{
    max-width:1500px;
    margin:auto;
}

/* HEADER */

.header{
    height:90px;
    background:white;
    border-radius:60px;
    padding:0 35px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:
    0 15px 40px rgba(150,150,255,.12);
}

.logo{
    font-size:2rem;
    font-weight:800;
    color:#444;
}

.right-header{
    display:flex;
    align-items:center;
    gap:20px;
}

.search{
    width:260px;
    height:55px;
    border:none;
    outline:none;
    background:#f7f7ff;
    border-radius:999px;
    padding-left:25px;
    font-size:1rem;
}

.profile{
    width:58px;
    height:58px;
    border-radius:50%;
    background:linear-gradient(135deg,#8cc8ff,#c98fff);
    box-shadow:0 10px 25px rgba(170,120,255,.25);
    cursor:pointer;
}

/* SUB HEADER */

.subheader{
    margin-top:20px;
    height:45px;
    border-radius:999px;
    background:white;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
}

/* MAIN */

.main{
    display:flex;
    gap:35px;
    margin-top:40px;
}

/* SIDE BUBBLES */

.sidebar{
    display:flex;
    flex-direction:column;
    gap:25px;
}

.bubble{
    width:120px;
    height:120px;
    border-radius:50%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:1.1rem;
    font-weight:700;
    cursor:pointer;
    transition:.35s;
    box-shadow:0 12px 25px rgba(0,0,0,.08);
}

.bubble:hover{
    transform:translateY(-5px) scale(1.05);
}

.active{
    background:linear-gradient(135deg,#7ad6ff,#ae7cff);
    color:white;
    transform:scale(1.08);
    box-shadow:
    0 18px 40px rgba(120,140,255,.4),
    0 0 30px rgba(150,130,255,.5);
}

/* CONTENT */

.content{
    flex:1;
}

/* VIDEO ROW */

.video-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    position:relative;
    overflow:hidden;
    border-radius:40px;
    height:260px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:80px;
    height:80px;
    border-radius:50%;
    background:rgba(255,255,255,.4);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    color:white;
    transition:.3s;
}

.hovered .play{
    transform:translate(-50%,-50%) scale(1.15);
    box-shadow:0 0 30px #ffffff;
}

/* GALLERY */

.gallery{
    margin-top:35px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.gallery-card{
    height:260px;
    overflow:hidden;
    border-radius:40px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.gallery-card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.5s;
}

.gallery-card:hover img{
    transform:scale(1.08);
}

/* RESPONSIVE */

@media(max-width:1000px){

.video-row,
.gallery{
    grid-template-columns:1fr;
}

.main{
    flex-direction:column;
}

.sidebar{
    flex-direction:row;
}

.bubble{
    width:90px;
    height:90px;
}
}

</style>
</head>
<body>

<div class="container">

<div class="header">
<div class="logo">Home</div>

<div class="right-header">
<input class="search" placeholder="Search...">
<div class="profile"></div>
</div>
</div>

<div class="subheader"></div>

<div class="main">

<div class="sidebar">

<div class="bubble active">Blog</div>
<div class="bubble">Vlogs</div>
<div class="bubble">Photos</div>

</div>

<div class="content">

<div class="video-row">

<div class="card">
<img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200">
<div class="play">▶</div>
</div>

<div class="card hovered">
<img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?w=1200">
<div class="play">▶</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1200">
<div class="play">▶</div>
</div>

</div>

<div class="gallery">

<div class="gallery-card">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=1200">
</div>

<div class="gallery-card">
<img src="https://images.unsplash.com/photo-1511988617509-a57c8a288659?w=1200">
</div>

<div class="gallery-card">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=1200">
</div>

</div>

</div>

</div>

</div>

<script>

document.querySelectorAll(".bubble").forEach(button=>{

button.addEventListener("click",()=>{

document.querySelectorAll(".bubble").forEach(b=>{
b.classList.remove("active");
});

button.classList.add("active");

});

});

</script>

</body>
</html>
