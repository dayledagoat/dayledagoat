<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubbly Modern Landing Page</title>

<!-- Cute & Inviting Fredoka Font Setup -->
<link href="https://googleapis.com" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Fredoka', sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg,#fff8ff,#f5f8ff,#fff7f9);
    padding:30px;
    overflow-x:hidden;
}

.container{
    max-width:1500px;
    margin:auto;
}

/* HEADER WITH GLASSMORPHISM */
.header{
    height:90px;
    padding:0 35px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,.35);
    backdrop-filter:blur(25px);
    border-radius:999px;
    border:1px solid rgba(255,255,255,.7);
    box-shadow:
        inset 0 2px 4px rgba(255,255,255,.9),
        0 20px 50px rgba(100,100,255,.08);
}

.logo{
    font-size:2.2rem; 
    font-weight:700;
    color:#444;
}

/* SUB HEADER PANEL */
.subheader{
    margin-top:20px;
    height:45px;
    border-radius:999px;
    background:rgba(255,255,255,.35);
    backdrop-filter:blur(20px);
}

/* MAIN CONTENT SPLIT */
.main{
    display:flex;
    gap:35px;
    margin-top:40px;
}

/* SIDEBAR BUBBLES */
.sidebar{
    display:flex;
    flex-direction:column;
    gap:25px;
}

.bubble{
    width:120px;
    height:120px;
    border-radius:50%;
    background:rgba(255,255,255,.35);
    backdrop-filter:blur(20px);
    display:flex;
    justify-content:center;
    align-items:center;
    text-align: center;
    font-size:1.15rem;
    font-weight:600;
    cursor:pointer;
    transition:.4s;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    padding: 10px;
}

.bubble:hover{
    transform:translateY(-8px) scale(1.05);
}

.active{
    color:white;
    background:linear-gradient(135deg,#7fd6ff,#ae7fff);
    box-shadow:0 0 40px rgba(160,130,255,.5);
    transform:scale(1.05);
}

.content{
    flex:1;
}

/* TAB CONTENT CONTROLS (CRITICAL VISIBILITY RULES FIXED HERE) */
.tab-content {
    display: none !important; /* Hides all tabs by default */
}

.tab-content.active-tab {
    display: block !important; /* Forces the active selected tab to display instantly */
}

/* VIDEO GRID */
.video-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    position:relative;
    overflow:hidden;
    border-radius:40px;
    height:260px;
    box-shadow:0 20px 50px rgba(0,0,0,.1);
    cursor:pointer;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events: none;
}

/* VIDEO PLAY BUTTON Overlay */
.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90px;
    height:90px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,.3);
    backdrop-filter:blur(20px);
    color:white;
    font-size:2rem;
    padding-left: 5px; 
    transition:.3s;
    pointer-events: none; 
}

.card:hover .play {
    transform:translate(-50%,-50%) scale(1.2);
    box-shadow: 0 0 30px rgba(255,255,255,0.6);
}

/* PHOTO GALLERY */
.gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.gallery-card{
    height:260px;
    overflow:hidden;
    border-radius:40px;
    box-shadow:0 20px 50px rgba(0,0,0,.1);
    transition:.3s;
}

.gallery-card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.6s;
}

.gallery-card:hover img{
    transform:scale(1.1);
}

/* ABOUT ME PROFILE SECTION */
.about-card-container {
    background: rgba(255,255,255,.35);
    backdrop-filter: blur(20px);
    border-radius: 40px;
    padding: 40px;
    box-shadow: 0 20px 50px rgba(0,0,0,.06);
    border: 1px solid rgba(255,255,255,.5);
    display: flex;
    align-items: center;
    gap: 40px;
}

.about-avatar-frame {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 5px solid white;
    box-shadow: 0 10px 25px rgba(160,130,255,.2);
}

.about-avatar-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.about-text-frame {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.about-text-frame h2 {
    font-size: 2rem;
    color: #444;
    font-weight: 700;
}

.about-text-frame p {
    font-size: 1.15rem;
    color: #666;
    line-height: 1.6;
    max-width: 800px;
}

/* VIDEO POPUP MODAL STYLING */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(15px);
    display: flex !important;
    justify-content: center;
    align-items: center;
    z-index: 99999;
    opacity: 0 !important; 
    pointer-events: none !important; 
    visibility: hidden !important;
    transition: opacity 0.4s ease, visibility 0.4s ease;
}

.modal-overlay.open {
    opacity: 1 !important;
    pointer-events: auto !important;
    visibility: visible !important;
}

.modal-content {
    position: relative;
    width: 90%;
    max-width: 800px;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    transform: scale(0.8);
    transition: transform 0.4s ease;
}

.modal-overlay.open .modal-content {
    transform: scale(1);
}

.modal-content video {
    width: 100%;
    display: block;
    background: #000;
}

.modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 45px;
    height: 45px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 50%;
    color: white;
    font-size: 1.8rem;
    line-height: 40px;
    cursor: pointer;
    z-index: 10;
    transition: 0.3s;
}

.modal-close:hover {
    background: rgba(255, 255, 255, 0.4);
    transform: rotate(90deg);
}

/* RESPONSIVE BREAKPOINTS */
@media(max-width:1000px){
    .video-row, .gallery, .about-card-container{
        grid-template-columns:1fr;
    }
    .about-card-container {
        flex-direction: column;
        text-align: center;
        padding: 30px;
    }
    .main{
        flex-direction:column;
    }
    .sidebar{
        flex-direction:row;
        justify-content: center;
    }
    .bubble{
        width:90px;
        height:90px;
        font-size: 0.95rem;
    }
    // 1. Sidebar selection & content panel filter swapping logic
const bubbles = document.querySelectorAll(".bubble");
const tabContents = document.querySelectorAll(".tab-content");
bubbles.forEach(button => {
button.addEventListener("click", () => {
// Clear active bubble styles
bubbles.forEach(b => b.classList.remove("active"));
button.classList.add("active");
// Hide all active content tabs safely
tabContents.forEach(content => content.classList.remove("active-tab"));
// Match the target data id string from custom attribute markers
const targetTabId = button.getAttribute("data-tab");
const activeContentBlock = document.getElementById(targetTabId);
if (activeContentBlock) {
activeContentBlock.classList.add("active-tab");
}
});
});
// 2. 3D Card mouse tilting effects
document.querySelectorAll(".card").forEach(card => {
card.addEventListener("mousemove", (e) => {
const rect = card.getBoundingClientRect();
const x = e.clientX - rect.left;
const y = e.clientY - rect.top;
const rotateX = (rect.height / 2 - y) / 10;
const rotateY = (x - rect.width / 2) / 10;
card.style.transform = perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px);
});
card.addEventListener("mouseleave", () => {
card.style.transform = "perspective(1000px) rotateX(0deg) rotateY(0deg)";
});
});
// 4. Video Modal Popup Execution Logic
const videoCards = document.querySelectorAll(".card");
const modal = document.getElementById("videoModal");
const modalPlayer = document.getElementById("modalPlayer");
const closeBtn = document.querySelector(".modal-close");
videoCards.forEach(card => {
card.addEventListener("click", () => {
const videoUrl = card.getAttribute("data-video");
if (videoUrl) {
modalPlayer.src = videoUrl;
modal.classList.add("open");
modalPlayer.play();
}
});
});
function closeModal() {
modal.classList.remove("open");
modalPlayer.pause();
modalPlayer.src = "";
}
closeBtn.addEventListener("click", closeModal);
modal.addEventListener("click", (e) => {
if (e.target === modal) closeModal();
});
}
</style>
</head>
