<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubbly Modern Landing Page</title>

<!-- Nunito Font -->
<link href="https://googleapis.com" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Nunito',sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg,#fff8ff,#f5f8ff,#fff7f9);
    padding:30px;
    overflow-x:hidden;
}

.container{
    max-width:1500px;
    margin:auto;
}

/* HEADER WITH GLASSMORPHISM */
.header{
    height:90px;
    padding:0 35px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,.35);
    backdrop-filter:blur(25px);
    border-radius:999px;
    border:1px solid rgba(255,255,255,.7);
    box-shadow:
        inset 0 2px 4px rgba(255,255,255,.9),
        0 20px 50px rgba(100,100,255,.08);
}

.logo{
    font-size:2rem;
    font-weight:800;
    color:#444;
}

.right-header{
    display:flex;
    align-items:center;
    gap:20px;
    flex-shrink: 0; /* Prevents the search and profile elements from stretching out */
}

.search{
    width:260px; /* Locked down width */
    height:55px;
    border:none;
    outline:none;
    border-radius:999px;
    padding-left:25px;
    background:rgba(255,255,255,.4);
    backdrop-filter:blur(20px);
    font-size:1rem;
}

/* FLOATING PROFILE WITH PULSE */
.profile{
    width:60px;
    height:60px;
    border-radius:50%;
    background:linear-gradient(135deg,#7dd8ff,#b97dff);
    box-shadow:0 0 30px rgba(170,130,255,.4);
    cursor:pointer;
    animation:pulse 3s infinite alternate;
}

@keyframes pulse{
    to{
        transform:scale(1.1);
    }
}

/* SUB HEADER */
.subheader{
    margin-top:20px;
    height:45px;
    border-radius:999px;
    background:rgba(255,255,255,.35);
    backdrop-filter:blur(20px);
}

/* MAIN CONTENT SPLIT */
.main{
    display:flex;
    gap:35px;
    margin-top:40px;
}

/* SIDEBAR BUBBLES */
.sidebar{
    display:flex;
    flex-direction:column;
    gap:25px;
}

.bubble{
    width:120px;
    height:120px;
    border-radius:50%;
    background:rgba(255,255,255,.35);
    backdrop-filter:blur(20px);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:1.1rem;
    font-weight:700;
    cursor:pointer;
    transition:.4s;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.bubble:hover{
    transform:translateY(-8px) scale(1.05);
}

.active{
    color:white;
    background:linear-gradient(135deg,#7fd6ff,#ae7fff);
    box-shadow:0 0 40px rgba(160,130,255,.5);
    transform:scale(1.05);
}

.content{
    flex:1;
}

/* VIDEO GRID */
.video-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.card{
    position:relative;
    overflow:hidden;
    border-radius:40px;
    height:260px;
    box-shadow:0 20px 50px rgba(0,0,0,.1);
    cursor:pointer;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events: none; /* Keeps 3D cursor tracking flawless */
}

/* VIDEO PLAY BUTTON Overlay */
.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90px;
    height:90px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(255,255,255,.3);
    backdrop-filter:blur(20px);
    color:white;
    font-size:2rem;
    transition:.3s;
    pointer-events: none; 
}

.card:hover .play {
    transform:translate(-50%,-50%) scale(1.2);
    box-shadow: 0 0 30px rgba(255,255,255,0.6);
}

/* PHOTO GALLERY */
.gallery{
    margin-top:35px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

.gallery-card{
    height:260px;
    overflow:hidden;
    border-radius:40px;
    box-shadow:0 20px 50px rgba(0,0,0,.1);
    transition:.3s;
}

.gallery-card img{
    width:100%;
    height:100%;
    object-fit:cover;
    transition:.6s;
}

.gallery-card:hover img{
    transform:scale(1.1);
}

/* VIDEO POPUP MODAL STYLING */
/* Forces complete concealment unless explicitly triggered */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(15px);
    display: flex !important; /* Forces centered positioning logic */
    justify-content: center;
    align-items: center;
    z-index: 99999;
    opacity: 0 !important; 
    pointer-events: none !important; 
    visibility: hidden !important;
    transition: opacity 0.4s ease, visibility 0.4s ease;
}

/* Activated via JS */
.modal-overlay.open {
    opacity: 1 !important;
    pointer-events: auto !important;
    visibility: visible !important;
}

.modal-content {
    position: relative;
    width: 90%;
    max-width: 800px;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    transform: scale(0.8);
    transition: transform 0.4s ease;
}

.modal-overlay.open .modal-content {
    transform: scale(1);
}

.modal-content video {
    width: 100%;
    display: block;
    background: #000;
}

.modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 45px;
    height: 45px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 50%;
    color: white;
    font-size: 1.8rem;
    line-height: 40px;
    cursor: pointer;
    z-index: 10;
    transition: 0.3s;
}

.modal-close:hover {
    background: rgba(255, 255, 255, 0.4);
    transform: rotate(90deg);
}

/* RESPONSIVE BREAKPOINTS */
@media(max-width:1000px){
    .video-row, .gallery{
        grid-template-columns:1fr;
    }
    .main{
        flex-direction:column;
    }
    .sidebar{
        flex-direction:row;
    }
    .bubble{
        width:90px;
        height:90px;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- Header Navigation Section -->
    <div class="header">
        <div class="logo">Home</div>
        <div class="right-header">
            <input class="search" placeholder="Search...">
            <div class="profile"></div>
        </div>
    </div>

    <!-- Accent Subheader -->
    <div class="subheader"></div>

    <!-- Main Content Workspace Layout -->
    <div class="main">

        <!-- Sidebar Navigation Buttons -->
        <div class="sidebar">
            <div class="bubble active">Blog</div>
            <div class="bubble">Vlogs</div>
            <div class="bubble">Photos</div>
        </div>

        <!-- Dashboard Media Feeds -->
        <div class="content">

            <!-- Video Cards Section with sample videos linked -->
            <div class="video-row">
                <div class="card" data-video="https://w3schools.com">
                    <img src="https://unsplash.com" alt="Video cover thumbnail">
                    <div class="play">▶</div>
                </div>
                <div class="card" data-video="https://w3schools.com">
                    <img src="https://unsplash.com" alt="Video cover thumbnail">
                    <div class="play">▶</div>
                </div>
                <div class="card" data-video="https://w3schools.com">
                    <img src="https://unsplash.com" alt="Video cover thumbnail">
                    <div class="play">▶</div>
                </div>
            </div>

            <!-- Photo Gallery Section -->
            <div class="gallery">
                <div class="gallery-card">
                    <img src="https://unsplash.com" alt="Gallery thumbnail">
                </div>
                <div class="gallery-card">
                    <img src="https://unsplash.com" alt="Gallery thumbnail">
                </div>
                <div class="gallery-card">
                    <img src="https://unsplash.com" alt="Gallery thumbnail">
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Video Popup Overlay Shell Container -->
<div id="videoModal" class="modal-overlay">
    <div class="modal-content">
        <button class="modal-close">&times;</button>
        <video id="modalPlayer" controls></video>
    </div>
</div>

<!-- All Interactivity Logic -->
<script>
// 1. Sidebar selection toggles
const bubbles = document.querySelectorAll(".bubble");

bubbles.forEach(button => {
    button.addEventListener("click", () => {
        bubbles.forEach(b => b.classList.remove("active"));
        button.classList.add("active");
    });
});

// 2. 3D Card mouse tilting effects
document.querySelectorAll(".card").forEach(card => {
    card.addEventListener("mousemove", (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const rotateX = (rect.height / 2 - y) / 10;
        const rotateY = (x - rect.width / 2) / 10;

        card.style.transform = `
            perspective(1000px)
            rotateX(${rotateX}deg)
            rotateY(${rotateY}deg)
            translateY(-10px)
        `;
    });

    card.addEventListener("mouseleave", () => {
        card.style.transform = "perspective(1000px) rotateX(0deg) rotateY(0deg)";
    });
});

// 3. Automated Floating profile icon loop
const profile = document.querySelector(".profile");
let angle = 0;

setInterval(() => {
    angle += 0.02;
    profile.style.transform = `translateY(${Math.sin(angle) * 6}px)`;
}, 16);

// 4. Video Modal Popup Execution Logic
const videoCards = document.querySelectorAll(".card");
const modal = document.getElementById("videoModal");
const modalPlayer = document.getElementById("modalPlayer");
const closeBtn = document.querySelector(".modal-close");
videoCards.forEach(card => {
card.addEventListener("click", () => {
const videoUrl = card.getAttribute("data-video");
if (videoUrl) {
modalPlayer.src = videoUrl;
modal.classList.add("open");
modalPlayer.play();
}
});
});
function closeModal() {
modal.classList.remove("open");
modalPlayer.pause();
modalPlayer.src = "";
}
closeBtn.addEventListener("click", closeModal);
modal.addEventListener("click", (e) => {
if (e.target === modal) closeModal();
});
